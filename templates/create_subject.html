{% extends 'base.html' %}

{% block title %}
Add Subject
{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2>Add Subject</h2>

    <form method="POST">

        {{ form.hidden_tag() }}

        <div class="mb-3">
            {{ form.subject_name.label }}
            {{ form.subject_name(class="form-control") }}
        </div>

        {{ form.submit(class="btn btn-success") }}

    </form>

</div>

{% endblock %}
